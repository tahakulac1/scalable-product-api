version: "3.9"

services:
  api:
    build: .
    container_name: scalable-product-api
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
       REDIS_HOST: redis
       REDIS_PORT: 6379
       DATABASE_URL: postgresql://postgres:postgres@postgres:5432/scalable_product_db
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    container_name: redis
    
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scalable_product_db
   
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
